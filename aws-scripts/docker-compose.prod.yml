version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: nexusai-postgres-prod
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: nexusai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: nexusai-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: nexusai-backend-prod
    ports:
      - "3001:3001"
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis
    restart: always

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: nexusai-celery-prod
    command: ["celery", "-A", "celery_worker.celery_app", "worker", "--loglevel=info"]
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    restart: always

volumes:
  pgdata:
  redisdata:
